name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      # Non-blocking until the pre-existing no-explicit-any debt is cleaned up
      # (39 errors across legacy dashboard/types files as of 2026-06-11)
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Tests
        run: npm run test
